<?xml version="1.0" encoding="UTF-8"?>
<!-- TunaOS master mark — roundel + sonar fish -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="TunaOS">
  <circle cx="64" cy="64" r="60" fill="#0B1B2B"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#2EC4B6" stroke-width="2.5" opacity="0.35"/>
  <g fill="#2EC4B6">
    <!-- body -->
    <path d="M16 64 C 28 44, 52 35, 72 38 C 87 41, 98 50, 104 60 L 104 68 C 98 78, 87 87, 72 90 C 52 93, 28 84, 16 64 Z"/>
    <!-- tail -->
    <path d="M102 64 L 121 45 C 116 57.5, 116 70.5, 121 83 Z"/>
    <!-- dorsal fin -->
    <path d="M54 38.5 C 58 27, 70 24.5, 78 28.5 L 71 40 Z"/>
  </g>
  <!-- eye -->
  <circle cx="31" cy="58" r="4.5" fill="#0B1B2B"/>
  <circle cx="32.5" cy="56.5" r="1.4" fill="#2EC4B6"/>
  <!-- gill line -->
  <path d="M40 46 C 46 54, 46 74, 40 82" fill="none" stroke="#0B1B2B" stroke-width="3" stroke-linecap="round"/>
</svg>
